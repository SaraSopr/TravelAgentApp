services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_NAME: TravelAgentApp
      ENV: dev
      LOG_LEVEL: INFO
      API_HOST: 0.0.0.0
      API_PORT: 8000
      BUS_BACKEND: nats
      NATS_URL: nats://nats:4222
      POSTGRES_DSN: postgresql+asyncpg://postgres:postgres@postgres:5432/travel_agent
      REDIS_URL: redis://redis:6379/0
      STATE_BACKEND: postgres
      OBSERVER_POLL_SECONDS: 30
      OBSERVER_ENABLED: "true"
      OBSERVER_MAX_EVENTS_PER_CYCLE: 20
      THREAT_IMPACT_THRESHOLD: 0.65
      REPLAN_COOLDOWN_SECONDS: 180
      BUS_MAX_RETRIES: 2
      BUS_RETRY_BASE_MS: 150
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: travel-agent-app
      OTEL_EXPORTER_ENDPOINT: ""
      AUTH_SECRET: change-this-in-production
      AUTH_TOKEN_TTL_MINUTES: 120
      NEWS_API_URL: https://newsapi.org/v2/everything
      NEWS_API_KEY: ""
      TRANSIT_ALERTS_URL: ""
      SOCIAL_SIGNALS_URL: ""
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: travel_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d travel_agent"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
