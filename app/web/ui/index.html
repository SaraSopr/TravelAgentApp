<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Agent - Assistant</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: #ffffff;
      --line: #e7ebf3;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --success: #16a34a;
      --warning: #f59e0b;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.01em;
    }
    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }
    .grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1.05fr 1.95fr;
      gap: 16px;
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(16,24,40,.04);
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      margin-top: 10px;
    }
    input, select, textarea, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }
    textarea { min-height: 84px; resize: vertical; }
    .btn {
      border: none;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .btn.secondary {
      background: #334155;
      color: #fff;
    }
    .btn.warn {
      background: var(--warning);
      color: #111827;
    }
    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .rightStack {
      display: grid;
      gap: 16px;
    }
    .tripRow {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      background: #fff;
    }
    .tripRow.active {
      border-color: var(--primary);
      background: #eff6ff;
    }
    .tripMeta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 8px;
      border: 1px solid transparent;
    }
    .ok { background: #ecfdf3; color: #166534; border-color: #bbf7d0; }
    .warn { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
    .danger { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
    .timeline {
      margin-top: 8px;
      display: grid;
      gap: 10px;
    }
    .activity {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }
    .activityHead {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: baseline;
    }
    .activityName {
      font-weight: 700;
      font-size: 14px;
    }
    .activityMeta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .alertList {
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
    }
    .alert {
      border: 1px solid var(--line);
      border-left: 4px solid var(--warning);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }
    .alert.assessment { border-left-color: var(--primary); }
    .alert.replan { border-left-color: var(--success); }
    .small {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Travel Agent Assistant</h1>
    <div class="subtitle">Pianifica il viaggio e ricevi adattamenti in tempo reale su scioperi, proteste e disruption urbane.</div>

    <div class="grid">
      <section class="card">
        <h2>Nuovo viaggio</h2>
        <label>Account</label>
        <div class="row2">
          <input id="username" value="sara" placeholder="username" />
          <input id="password" type="password" value="password123" placeholder="password" />
        </div>
        <div class="actions">
          <button class="btn secondary" onclick="register()">Registrati</button>
          <button class="btn secondary" onclick="login()">Login</button>
          <button class="btn secondary" onclick="logout()">Logout</button>
        </div>
        <div class="status" id="authStatus">Non autenticata.</div>

        <div class="row2">
          <div>
            <label>Città</label>
            <select id="city">
              <option value="Milan">Milan</option>
              <option value="Rome">Rome</option>
              <option value="Paris">Paris</option>
            </select>
          </div>
          <div>
            <label>Partenza</label>
            <input id="startTime" type="datetime-local" />
          </div>
        </div>

        <div class="row2">
          <div>
            <label>Budget</label>
            <select id="budget">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div>
            <label>Mobilità</label>
            <select id="mobility">
              <option value="walk">Walk</option>
              <option value="public_transport" selected>Public Transport</option>
              <option value="taxi">Taxi</option>
            </select>
          </div>
        </div>

        <label>Interessi (separati da virgola)</label>
        <input id="interests" value="culture, food, sightseeing" />

        <label>Obiettivo viaggio</label>
        <textarea id="intent">Voglio una giornata bilanciata tra cultura, passeggiata e cena in zona sicura.</textarea>

        <div class="actions">
          <button class="btn" onclick="createTrip()">Genera itinerario</button>
          <button class="btn secondary" onclick="refreshTrips()">Aggiorna</button>
        </div>
        <div class="status" id="createStatus">Pronto.</div>
      </section>

      <section class="rightStack">
        <div class="card">
          <h2>I tuoi viaggi</h2>
          <div id="tripList"></div>
          <div class="actions">
            <button class="btn warn" onclick="simulateThreat()">Simula disruption</button>
            <button class="btn secondary" onclick="refreshCurrentTrip()">Refresh dettaglio</button>
          </div>
          <div class="status" id="tripStatus"></div>
        </div>

        <div class="card">
          <h2>Dettaglio itinerario</h2>
          <div id="tripOverview" class="small">Seleziona un viaggio per vedere timeline e raccomandazioni.</div>
          <div id="timeline" class="timeline"></div>
        </div>

        <div class="card">
          <h2>Alert in tempo reale</h2>
          <div id="alerts" class="alertList"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    let selectedTripId = null;
    let lastCorrelationId = null;
    let accessToken = localStorage.getItem('travel_agent_token') || '';
    let refreshToken = localStorage.getItem('travel_agent_refresh_token') || '';

    function toIsoLocal(date) {
      const tzOffset = date.getTimezoneOffset() * 60000;
      return new Date(date.getTime() - tzOffset).toISOString().slice(0, 16);
    }

    document.getElementById('startTime').value = toIsoLocal(new Date(Date.now() + 3600000));

    async function refreshAccessToken() {
      if (!refreshToken) return false;
      try {
        const response = await fetch('/api/auth/refresh', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: refreshToken }),
        });
        if (!response.ok) return false;
        const data = await response.json();
        accessToken = data.access_token || '';
        refreshToken = data.refresh_token || '';
        localStorage.setItem('travel_agent_token', accessToken);
        localStorage.setItem('travel_agent_refresh_token', refreshToken);
        return true;
      } catch (_) {
        return false;
      }
    }

    async function api(path, options = {}, allowRefresh = true) {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (accessToken) {
        headers.Authorization = `Bearer ${accessToken}`;
      }
      const response = await fetch(path, {
        headers,
        ...options,
      });
      if (response.status === 401 && allowRefresh && refreshToken) {
        const refreshed = await refreshAccessToken();
        if (refreshed) {
          return api(path, options, false);
        }
      }
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || `HTTP ${response.status}`);
      }
      return response.json();
    }

    async function register() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const status = document.getElementById('authStatus');
      try {
        const data = await api('/api/auth/register', {
          method: 'POST',
          body: JSON.stringify({ username, password }),
        });
        accessToken = data.access_token;
        refreshToken = data.refresh_token || '';
        localStorage.setItem('travel_agent_token', accessToken);
        localStorage.setItem('travel_agent_refresh_token', refreshToken);
        status.textContent = `Autenticata come ${data.username}`;
        await refreshTrips();
      } catch (error) {
        status.textContent = `Register fallita: ${error.message}`;
      }
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const status = document.getElementById('authStatus');
      try {
        const data = await api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ username, password }),
        });
        accessToken = data.access_token;
        refreshToken = data.refresh_token || '';
        localStorage.setItem('travel_agent_token', accessToken);
        localStorage.setItem('travel_agent_refresh_token', refreshToken);
        status.textContent = `Autenticata come ${data.username}`;
        await refreshTrips();
      } catch (error) {
        status.textContent = `Login fallito: ${error.message}`;
      }
    }

    async function logout() {
      const status = document.getElementById('authStatus');
      try {
        if (accessToken) {
          await api('/api/auth/logout', {
            method: 'POST',
            body: JSON.stringify({ refresh_token: refreshToken || '' }),
          }, false);
        }
      } catch (_) {
      }
      accessToken = '';
      refreshToken = '';
      localStorage.removeItem('travel_agent_token');
      localStorage.removeItem('travel_agent_refresh_token');
      selectedTripId = null;
      document.getElementById('tripList').innerHTML = '<div class="small">Sessione chiusa.</div>';
      document.getElementById('timeline').innerHTML = '';
      document.getElementById('alerts').innerHTML = '';
      status.textContent = 'Non autenticata.';
    }

    function formatRisk(risk) {
      if (risk >= 0.65) return '<span class="badge danger">Alto rischio</span>';
      if (risk >= 0.35) return '<span class="badge warn">Rischio medio</span>';
      return '<span class="badge ok">Stabile</span>';
    }

    function formatDate(value) {
      return new Date(value).toLocaleString('it-IT', { dateStyle: 'short', timeStyle: 'short' });
    }

    async function createTrip() {
      const status = document.getElementById('createStatus');
      const payload = {
        city: document.getElementById('city').value,
        intent: document.getElementById('intent').value.trim(),
        start_time: new Date(document.getElementById('startTime').value).toISOString(),
        budget_level: document.getElementById('budget').value,
        mobility_mode: document.getElementById('mobility').value,
        interests: document.getElementById('interests').value.split(',').map(x => x.trim()).filter(Boolean),
      };
      try {
        status.textContent = 'Generazione piano in corso...';
        const data = await api('/api/trips', { method: 'POST', body: JSON.stringify(payload) });
        lastCorrelationId = data.correlation_id;
        status.textContent = `Piano richiesto. correlation_id=${data.correlation_id}`;
        setTimeout(refreshTrips, 350);
      } catch (error) {
        status.textContent = `Errore: ${error.message}`;
      }
    }

    async function refreshTrips() {
      const list = document.getElementById('tripList');
      const status = document.getElementById('tripStatus');
      if (!accessToken) {
        list.innerHTML = '<div class="small">Esegui login per vedere i tuoi viaggi.</div>';
        return;
      }
      try {
        const data = await api('/api/trips');
        list.innerHTML = '';
        if (data.plans.length === 0) {
          list.innerHTML = '<div class="small">Nessun viaggio ancora creato.</div>';
          status.textContent = '';
          return;
        }

        data.plans.forEach((plan) => {
          const row = document.createElement('div');
          row.className = `tripRow ${selectedTripId === plan.trip_id ? 'active' : ''}`;
          row.innerHTML = `
            <div><strong>${plan.city}</strong> · ${formatRisk(plan.risk_level)} <span class="badge">v${plan.version}</span></div>
            <div class="tripMeta">Trip: ${plan.trip_id} · Activities: ${plan.activities.length}</div>
          `;
          row.onclick = async () => {
            selectedTripId = plan.trip_id;
            await refreshCurrentTrip();
            await refreshTrips();
          };
          list.appendChild(row);
        });

        if (!selectedTripId) {
          selectedTripId = data.plans[0].trip_id;
        }
        status.textContent = `Viaggi attivi: ${data.plans.length}`;
        await refreshCurrentTrip();
      } catch (error) {
        list.innerHTML = `<div class="small">Errore caricamento viaggi: ${error.message}</div>`;
      }
    }

    async function refreshCurrentTrip() {
      const overview = document.getElementById('tripOverview');
      const timeline = document.getElementById('timeline');
      const alerts = document.getElementById('alerts');

      if (!selectedTripId) {
        overview.textContent = 'Seleziona un viaggio.';
        timeline.innerHTML = '';
        alerts.innerHTML = '';
        return;
      }

      try {
        const [tripData, alertsData] = await Promise.all([
          api(`/api/trips/${encodeURIComponent(selectedTripId)}`),
          api(`/api/trips/${encodeURIComponent(selectedTripId)}/alerts`),
        ]);

        if (!tripData.found) {
          overview.textContent = 'Viaggio non trovato.';
          timeline.innerHTML = '';
          alerts.innerHTML = '';
          return;
        }

        const trip = tripData.trip;
        overview.innerHTML = `
          ${formatRisk(trip.risk_level)}
          <span class="badge">${trip.status}</span>
          <span class="badge">budget: ${trip.budget_level}</span>
          <span class="badge">mobilità: ${trip.mobility_mode}</span>
          <div class="small">Interessi: ${(trip.interests || []).join(', ') || 'n/a'}</div>
        `;

        timeline.innerHTML = '';
        trip.activities
          .sort((a, b) => new Date(a.starts_at) - new Date(b.starts_at))
          .forEach((activity) => {
            const card = document.createElement('div');
            card.className = 'activity';
            card.innerHTML = `
              <div class="activityHead">
                <div class="activityName">${activity.name}</div>
                <div class="small">${formatDate(activity.starts_at)} → ${formatDate(activity.ends_at)}</div>
              </div>
              <div class="activityMeta">${activity.category} · ${activity.address}</div>
              <div class="activityMeta">Trasporto: ${activity.transport_mode} · Costo stimato: €${Number(activity.estimated_cost_eur || 0).toFixed(2)}</div>
              <div class="activityMeta">${activity.notes || ''}</div>
            `;
            timeline.appendChild(card);
          });

        alerts.innerHTML = '';
        if ((alertsData.alerts || []).length === 0) {
          alerts.innerHTML = '<div class="small">Nessun alert rilevante per questo viaggio.</div>';
        } else {
          alertsData.alerts.forEach((item) => {
            const el = document.createElement('div');
            el.className = `alert ${item.type}`;
            el.innerHTML = `
              <div><strong>${item.type.toUpperCase()}</strong> · ${formatDate(item.at)}</div>
              <div class="small">${item.description}</div>
              <div class="small">confidenza: ${Number(item.confidence || 0).toFixed(2)} ${item.action ? `· azione: ${item.action}` : ''}</div>
            `;
            alerts.appendChild(el);
          });
        }
      } catch (error) {
        overview.textContent = `Errore caricamento dettaglio: ${error.message}`;
      }
    }

    async function simulateThreat() {
      const status = document.getElementById('tripStatus');
      if (!selectedTripId) {
        status.textContent = 'Seleziona un viaggio prima di simulare un evento.';
        return;
      }
      try {
        const correlation = lastCorrelationId || crypto.randomUUID();
        await api(`/api/threats/simulate?correlation_id=${encodeURIComponent(correlation)}&trip_id=${encodeURIComponent(selectedTripId)}`, {
          method: 'POST',
        });
        status.textContent = 'Evento disruption inviato. Ricalcolo in corso...';
        setTimeout(refreshCurrentTrip, 500);
        setTimeout(refreshTrips, 700);
      } catch (error) {
        status.textContent = `Errore simulazione: ${error.message}`;
      }
    }

    async function bootstrap() {
      await refreshTrips();
      setInterval(refreshCurrentTrip, 7000);
    }

    bootstrap();
  </script>
</body>
</html>
